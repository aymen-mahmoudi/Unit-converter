<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Unit Converter — all units at once">
<title>Unit Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f4;
    --panel:#ffffff;
    --ink:#16202a;
    --muted:#6b7785;
    --accent:#0f8b8d;
    --accent-soft:#e3f4f3;
    --accent-ink:#0b5f60;
    --border:#dbe1e7;
    --error:#c24545;
    --error-soft:#fbe9e9;
    --radius:10px;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size:28px 28px;
    background-position:-1px -1px;
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
  }

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:40px 20px 80px;
  }

  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    margin-bottom:28px;
    flex-wrap:wrap;
  }

  h1{
    font-size:1.5rem;
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0;
  }

  h1 .dot{
    color:var(--accent);
  }

  .subtitle{
    color:var(--muted);
    font-size:0.85rem;
    margin:2px 0 0;
  }

  .hint{
    font-size:0.78rem;
    color:var(--muted);
  }

  /* Category selector — segmented tab row */
  .categories{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:6px;
    margin-bottom:24px;
  }

  .cat-btn{
    appearance:none;
    border:none;
    background:transparent;
    color:var(--muted);
    font-family:inherit;
    font-size:0.82rem;
    font-weight:600;
    letter-spacing:0.01em;
    padding:8px 14px;
    border-radius:7px;
    cursor:pointer;
    transition:background 0.15s ease, color 0.15s ease;
    white-space:nowrap;
  }

  .cat-btn:hover{
    color:var(--ink);
    background:var(--accent-soft);
  }

  .cat-btn.active{
    background:var(--accent);
    color:#fff;
  }

  /* Grid of unit displays */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:12px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 14px 12px;
    position:relative;
    transition:border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .card.focused{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }

  .card.invalid{
    border-color:var(--error);
    box-shadow:0 0 0 3px var(--error-soft);
  }

  .unit-label{
    font-size:0.72rem;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    margin-bottom:6px;
    display:block;
  }

  .unit-input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font-family:'JetBrains Mono', monospace;
    font-size:1.15rem;
    font-weight:500;
    color:var(--ink);
    padding:0;
  }

  .unit-input.dash{
    color:var(--muted);
  }

  footer{
    margin-top:28px;
    font-size:0.76rem;
    color:var(--muted);
    text-align:center;
  }

  @media (max-width:480px){
    .grid{grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));}
    h1{font-size:1.3rem;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Unit Converter<span class="dot">.</span></h1>
      <p class="subtitle">by aymen mahmoudi 2026</p>
    </div>
    <p class="hint" id="unitCount"></p>
  </header>

  <div class="categories" id="categories"></div>

  <div class="grid" id="grid"></div>
</div>

<script>
function energyToEV(val, unit) {
  switch (unit) {
    case 'eV': return val;
    case 'meV': return val / 1000;
    case 'nm': return 1239.84193 / val;
    case 'cm⁻¹': return val / 8065.54429;
    case 'kHz': return val * 4.135667696e-12;
    case 'MHz': return val * 4.135667696e-9;
    case 'GHz': return val * 4.135667696e-6;
    case 'THz': return val * 0.004135667696;
    case 'ps': return 4.135667696e-3 / val;
    case 'ns': return 4.135667696e-6 / val;
    case 'us': return 4.135667696e-9 / val;
    case 'fs': return 4.135667696 / val;
    case 'J': return val / 1.602176634e-19;
    case 'cal': return val / 4.184;
    case 'kWh': return val * 4.467037e-26;
    case 'temp': return val * 8.617333262e-5;
    default: return NaN;
  }
}
function energyFromEV(val, unit) {
  switch (unit) {
    case 'eV': return val;
    case 'meV': return val * 1000;
    case 'nm': return 1239.84193 / val;
    case 'cm⁻¹': return val * 8065.54429;
    case 'kHz': return val / 4.135667696e-12;
    case 'MHz': return val / 4.135667696e-9;
    case 'GHz': return val / 4.135667696e-6;
    case 'THz': return val / 0.004135667696;
    case 'ps': return 4.135667696e-3 / val;
    case 'ns': return 4.135667696e-6 / val;
    case 'us': return 4.135667696e-9 / val;
    case 'fs': return 4.135667696 / val;
    case 'J': return val * 1.602176634e-19;
    case 'cal': return val * 4.184;
    case 'kWh': return val / 4.467037e-26;
    case 'temp': return val / 8.617333262e-5;
    default: return NaN;
  }
}
function convertEnergy(val, from, to) {
  if (from === to) return val;
  if (val === 0 && ['nm', 'ps', 'ns', 'us', 'fs'].includes(from)) return NaN;
  if (val === 0 && ['nm', 'ps', 'ns', 'us', 'fs'].includes(to)) return NaN;
  const ev = energyToEV(val, from);
  return energyFromEV(ev, to);
}
        const conversionFactors = {
          energy: {
            units: ['nm', 'eV', 'meV', 'cm⁻¹', 'temp', 'kHz', 'MHz', 'GHz', 'THz', 'ps', 'ns', 'us', 'fs', 'J', 'cal'],
            factors: {
              eV: (val, to) => convertEnergy(val, 'eV', to),
              meV: (val, to) => convertEnergy(val, 'meV', to),
              nm: (val, to) => convertEnergy(val, 'nm', to),
              'cm⁻¹': (val, to) => convertEnergy(val, 'cm⁻¹', to),
              GHz: (val, to) => convertEnergy(val, 'GHz', to),
              THz: (val, to) => convertEnergy(val, 'THz', to),
              ps: (val, to) => convertEnergy(val, 'ps', to),
              ns: (val, to) => convertEnergy(val, 'ns', to),
              us: (val, to) => convertEnergy(val, 'us', to),
              fs: (val, to) => convertEnergy(val, 'fs', to),
              J: (val, to) => convertEnergy(val, 'J', to),
              cal: (val, to) => convertEnergy(val, 'cal', to),
              kWh: (val, to) => convertEnergy(val, 'kWh', to),
              temp: (val, to) => convertEnergy(val, 'temp', to),
              kHz: (val, to) => convertEnergy(val, 'kHz', to),
              MHz: (val, to) => convertEnergy(val, 'MHz', to),
            },
            seed: 'nm',
            seedValue: 200
          },
          pressure: {
    units: ['Pa', 'Bar', 'atm', 'Torr', 'psi', 'mbar'],
    factors: { Pa: 1, Bar: 0.00001, atm: 0.000009869233, Torr: 0.007500617, psi: 0.0001450377, mbar: 0.01 },
    seed: 'Pa', seedValue: 101325
  },
  temperature: {
    units: ['Celsius', 'Fahrenheit', 'Kelvin'],
    factors: {
      Celsius: (val, to) => to === 'Fahrenheit' ? (val * 9/5) + 32 : to === 'Kelvin' ? val + 273.15 : val,
      Fahrenheit: (val, to) => to === 'Celsius' ? (val - 32) * 5/9 : to === 'Kelvin' ? ((val - 32) * 5/9) + 273.15 : val,
      Kelvin: (val, to) => to === 'Celsius' ? val - 273.15 : to === 'Fahrenheit' ? ((val - 273.15) * 9/5) + 32 : val,
    },
    seed: 'Celsius', seedValue: 20
  },
  volume: {
    units: ['Liter', 'Milliliter', 'Cubic Meter', 'Gallon', 'Quart', 'Pint'],
    factors: { Liter: 1, Milliliter: 1000, 'Cubic Meter': 0.001, Gallon: 0.264172, Quart: 1.05669, Pint: 2.11338 },
    seed: 'Liter', seedValue: 1
  },
  mass: {
    units: ['Kilogram', 'Gram', 'Milligram', 'Pound', 'Ounce'],
    factors: { Kilogram: 1, Gram: 1000, Milligram: 1000000, Pound: 2.20462, Ounce: 35.274 },
    seed: 'Kilogram', seedValue: 1
  },
  area: {
    units: ['Square Meter', 'Square Kilometer', 'Square Mile', 'Square Yard', 'Square Foot', 'Acre'],
    factors: { 'Square Meter': 1, 'Square Kilometer': 0.000001, 'Square Mile': 0.000000386102, 'Square Yard': 1.19599, 'Square Foot': 10.7639, 'Acre': 0.000247105 },
    seed: 'Square Meter', seedValue: 1
  },
  length: {
    units: ['Meter', 'Kilometer', 'Centimeter', 'Millimeter', 'Mile', 'Yard', 'Foot', 'Inch', 'Angstrom'],
    factors: { Meter: 1, Kilometer: 0.001, Centimeter: 100, Millimeter: 1000, Mile: 0.000621371, Yard: 1.09361, Foot: 3.28084, Inch: 39.3701, Angstrom: 1e10 },
    seed: 'Meter', seedValue: 1
  },
  speed: {
    units: ['m/s', 'km/h', 'mph', 'ft/s', 'knot'],
    factors: { 'm/s': 1, 'km/h': 3.6, mph: 2.23694, 'ft/s': 3.28084, knot: 1.94384 },
    seed: 'm/s', seedValue: 1
  }
};

const FUNCTION_BASED = ['energy', 'temperature'];

let currentCategory = 'energy';

const categoriesEl = document.getElementById('categories');
const gridEl = document.getElementById('grid');
const unitCountEl = document.getElementById('unitCount');

function convertValue(category, fromUnit, value, toUnit) {
  if (fromUnit === toUnit) return value;
  const cat = conversionFactors[category];
  if (FUNCTION_BASED.includes(category)) {
    return cat.factors[fromUnit](value, toUnit);
  }
  const fromFactor = cat.factors[fromUnit];
  const toFactor = cat.factors[toUnit];
  return (value / fromFactor) * toFactor;
}

function formatNumber(n) {
  if (!isFinite(n)) return null;
  const abs = Math.abs(n);
  if (abs !== 0 && (abs > 1e6 || abs < 1e-6)) {
    return n.toExponential(4).replace(/\.?0+e/, 'e');
  }
  return n.toFixed(6).replace(/\.?0+$/, '');
}

function buildCategoryTabs() {
  categoriesEl.innerHTML = '';
  Object.keys(conversionFactors).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCategory ? ' active' : '');
    btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    btn.addEventListener('click', () => {
      if (currentCategory === cat) return;
      currentCategory = cat;
      buildCategoryTabs();
      buildGrid();
    });
    categoriesEl.appendChild(btn);
  });
}

function buildGrid() {
  const cat = conversionFactors[currentCategory];
  gridEl.innerHTML = '';
  unitCountEl.textContent = cat.units.length + ' units';

  cat.units.forEach(unit => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.unit = unit;

    const label = document.createElement('span');
    label.className = 'unit-label';
    label.textContent = unit;

    const input = document.createElement('input');
    input.className = 'unit-input';
    input.type = 'text';
    input.inputMode = 'decimal';
    input.autocomplete = 'off';
    input.spellcheck = false;

    input.addEventListener('focus', () => card.classList.add('focused'));
    input.addEventListener('blur', () => card.classList.remove('focused'));
    input.addEventListener('input', () => onUnitInput(unit));

    card.appendChild(label);
    card.appendChild(input);
    gridEl.appendChild(card);
  });

  // Seed initial values
  const seedInput = gridEl.querySelector(`[data-unit="${cssEscape(cat.seed)}"] input`);
  if (seedInput) {
    seedInput.value = cat.seedValue;
    onUnitInput(cat.seed);
  }
}

function cssEscape(str) {
  return (window.CSS && CSS.escape) ? CSS.escape(str) : str.replace(/([^\w-])/g, '\\$1');
}

function onUnitInput(sourceUnit) {
  const cat = conversionFactors[currentCategory];
  const sourceCard = gridEl.querySelector(`[data-unit="${cssEscape(sourceUnit)}"]`);
  const sourceInput = sourceCard.querySelector('input');
  const raw = sourceInput.value.trim();

  const numericalRegex = /^[+-]?(?:\d*\.?\d+)(?:[eE][+-]?\d+)?$/;
  const isValid = raw !== '' && numericalRegex.test(raw) && isFinite(parseFloat(raw));

  sourceCard.classList.toggle('invalid', raw !== '' && !isValid);

  if (!isValid) {
    // clear all other fields to a dash state if the source is unusable
    cat.units.forEach(unit => {
      if (unit === sourceUnit) return;
      const otherCard = gridEl.querySelector(`[data-unit="${cssEscape(unit)}"]`);
      const otherInput = otherCard.querySelector('input');
      otherInput.value = '';
      otherInput.classList.remove('dash');
      otherCard.classList.remove('invalid');
    });
    return;
  }

  const value = parseFloat(raw);

  cat.units.forEach(unit => {
    if (unit === sourceUnit) return;
    const otherCard = gridEl.querySelector(`[data-unit="${cssEscape(unit)}"]`);
    const otherInput = otherCard.querySelector('input');
    const result = convertValue(currentCategory, sourceUnit, value, unit);
    const formatted = formatNumber(result);

    if (formatted === null) {
      otherInput.value = '—';
      otherInput.classList.add('dash');
      otherCard.classList.add('invalid');
    } else {
      otherInput.value = formatted;
      otherInput.classList.remove('dash');
      otherCard.classList.remove('invalid');
    }
  });
}

buildCategoryTabs();
buildGrid();
</script>
</body>
</html>
